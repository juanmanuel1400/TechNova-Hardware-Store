<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechNova | Hardware & Gaming</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
        .card:hover { transform: translateY(-5px); transition: 0.3s ease; box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important; }
        .hero-section { background: linear-gradient(135deg, #0d6efd 0%, #0dcaf0 100%); color: white; padding: 4rem 0; border-radius: 0 0 2rem 2rem; margin-bottom: 3rem; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#"><i class="bi bi-cpu"></i> TechNova Gamer</a>
            
            <div class="d-flex align-items-center gap-3">
                <button class="btn btn-outline-light btn-sm" data-bs-toggle="modal" data-bs-target="#modalOrdenes" onclick="cargarOrdenes()">
                    <i class="bi bi-receipt"></i> Mis Órdenes
                </button>
                
                <button class="btn btn-primary position-relative" data-bs-toggle="offcanvas" data-bs-target="#carritoOffcanvas">
                    <i class="bi bi-cart3"></i> Carrito
                    <span id="contador-carrito" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                        0
                    </span>
                </button>
            </div>
        </div>
    </nav>

    <div class="hero-section text-center shadow">
        <div class="container">
            <h1 class="display-4 fw-bold">Potencia tu Setup</h1>
            <p class="lead">Agrega tus componentes al carrito y paga de forma segura.</p>
        </div>
    </div>

    <div class="container mb-5">
        <div class="row" id="contenedor-productos">
            </div>
    </div>

    <div class="offcanvas offcanvas-end" tabindex="-1" id="carritoOffcanvas" style="width: 400px;">
        <div class="offcanvas-header bg-light border-bottom">
            <h5 class="offcanvas-title fw-bold"><i class="bi bi-cart-check"></i> Tu Carrito</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body d-flex flex-column">
            
            <ul id="lista-carrito" class="list-group list-group-flush mb-3 flex-grow-1 overflow-auto">
                <li class="list-group-item text-center text-muted mt-5">El carrito está vacío</li>
            </ul>

            <div class="border-top pt-3">
                <h4 class="d-flex justify-content-between mb-4">
                    <span>Total:</span> <strong class="text-primary" id="total-carrito">$0</strong>
                </h4>
                
                <form id="formulario-pago" onsubmit="procesarPago(event)">
                    <h6 class="text-muted mb-3"><i class="bi bi-credit-card"></i> Método de Pago</h6>
                    <div class="mb-2">
                        <input type="text" class="form-control" placeholder="Número de Tarjeta" required pattern="\d{16}" title="Debe tener 16 números">
                    </div>
                    <div class="row mb-3">
                        <div class="col-6">
                            <input type="text" class="form-control" placeholder="MM/YY" required>
                        </div>
                        <div class="col-6">
                            <input type="text" class="form-control" placeholder="CVV" required pattern="\d{3}">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-success w-100 btn-lg shadow-sm" id="btn-pagar" disabled>
                        <i class="bi bi-lock-fill"></i> Pagar de forma segura
                    </button>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalOrdenes" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title"><i class="bi bi-receipt"></i> Historial de Compras</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <ul id="lista-ordenes" class="list-group list-group-flush">
                        </ul>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 2000;">
        <div id="notificacion" class="toast align-items-center text-bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body" id="toast-mensaje"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        
        let catalogoGlobal = [];
        let carrito = [];

        function mostrarToast(mensaje, esError = false) {
            const toastEl = document.getElementById('notificacion');
            const toastMsg = document.getElementById('toast-mensaje');
            const toast = new bootstrap.Toast(toastEl);
            toastEl.className = `toast align-items-center border-0 ${esError ? 'text-bg-danger' : 'text-bg-success'}`;
            toastMsg.innerHTML = esError ? `<i class="bi bi-exclamation-triangle"></i> ${mensaje}` : `<i class="bi bi-check-circle"></i> ${mensaje}`;
            toast.show();
        }

        
        function cargarProductos() {
            fetch('/api/productos')
                .then(response => response.json())
                .then(productos => {
                    catalogoGlobal = productos; 
                    const contenedor = document.getElementById('contenedor-productos');
                    contenedor.innerHTML = ''; 
                    
                    productos.forEach(prod => {
                        const sinStock = prod.stock === 0;
                        const tarjeta = `
                            <div class="col-md-4 mb-4">
                                <div class="card h-100 shadow-sm border-0">
                                    <img src="${prod.imagen}" class="card-img-top" alt="${prod.nombre}" style="height: 220px; object-fit: cover;">
                                    <div class="card-body d-flex flex-column">
                                        <h5 class="card-title fw-bold">${prod.nombre}</h5>
                                        <h4 class="card-text text-primary mb-3">$${prod.precio}</h4>
                                        <p class="card-text ${sinStock ? 'text-danger fw-bold' : 'text-success'}">
                                            <i class="bi ${sinStock ? 'bi-x-circle' : 'bi-box-seam'}"></i> 
                                            ${sinStock ? 'Agotado' : `Stock: ${prod.stock} unidades`}
                                        </p>
                                        <button class="btn ${sinStock ? 'btn-secondary' : 'btn-outline-primary'} mt-auto w-100" 
                                                onclick="agregarAlCarrito(${prod.id})" ${sinStock ? 'disabled' : ''}>
                                            <i class="bi bi-cart-plus"></i> Agregar al carrito
                                        </button>
                                    </div>
                                </div>
                            </div>
                        `;
                        contenedor.innerHTML += tarjeta;
                    });
                })
                .catch(error => console.error('Error:', error));
        }

        
        function agregarAlCarrito(productoId) {
            const producto = catalogoGlobal.find(p => p.id === productoId);
            carrito.push(producto);
            actualizarUI_Carrito();
            mostrarToast(`${producto.nombre} agregado al carrito`);
        }

        function actualizarUI_Carrito() {
            const lista = document.getElementById('lista-carrito');
            const totalEl = document.getElementById('total-carrito');
            const contador = document.getElementById('contador-carrito');
            const btnPagar = document.getElementById('btn-pagar');

            contador.innerText = carrito.length;

            if (carrito.length === 0) {
                lista.innerHTML = '<li class="list-group-item text-center text-muted mt-5">El carrito está vacío</li>';
                totalEl.innerText = "$0";
                btnPagar.disabled = true;
                return;
            }

            lista.innerHTML = '';
            let total = 0;
            carrito.forEach((item, index) => {
                total += item.precio;
                lista.innerHTML += `
                    <li class="list-group-item d-flex justify-content-between align-items-center px-0">
                        <small>${item.nombre}</small>
                        <div class="d-flex align-items-center gap-2">
                            <strong>$${item.precio}</strong>
                            <button class="btn btn-sm btn-danger text-white px-2 py-0" onclick="quitarDelCarrito(${index})">&times;</button>
                        </div>
                    </li>
                `;
            });

            totalEl.innerText = `$${total}`;
            btnPagar.disabled = false;
        }

        function quitarDelCarrito(index) {
            carrito.splice(index, 1);
            actualizarUI_Carrito();
        }

        
        async function procesarPago(evento) {
            evento.preventDefault(); 
            
            const btnPagar = document.getElementById('btn-pagar');
            btnPagar.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Procesando...';
            btnPagar.disabled = true;

            let errores = 0;

            
            for (const item of carrito) {
                try {
                    const respuesta = await fetch('/api/ordenes', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ usuario_id: 1, producto_id: item.id })
                    });
                    const data = await respuesta.json();
                    if (!data.mensaje) errores++;
                } catch (error) {
                    errores++;
                }
            }

            
            btnPagar.innerHTML = '<i class="bi bi-lock-fill"></i> Pagar de forma segura';

            if (errores === 0) {
                mostrarToast("¡Pago aprobado! Órdenes generadas con éxito.");
                carrito = []; 
                actualizarUI_Carrito();
                cargarProductos(); 
                
                
                const carritoCanvas = bootstrap.Offcanvas.getInstance(document.getElementById('carritoOffcanvas'));
                carritoCanvas.hide();
                
                
                document.getElementById('formulario-pago').reset();
            } else {
                mostrarToast(`Hubo un error con ${errores} producto(s). Revisa el stock.`, true);
                cargarProductos(); 
            }
        }

        
        function cargarOrdenes() {
            fetch('/api/ordenes')
                .then(response => response.json())
                .then(ordenes => {
                    const contenedor = document.getElementById('lista-ordenes');
                    if(ordenes.length === 0) {
                        contenedor.innerHTML = '<li class="list-group-item text-center text-muted p-4"><i class="bi bi-inbox fs-2 d-block mb-2"></i>Sin historial de compras</li>';
                        return;
                    }
                    contenedor.innerHTML = ''; 
                    ordenes.reverse().forEach(orden => {
                        contenedor.innerHTML += `
                            <li class="list-group-item d-flex justify-content-between align-items-center p-3">
                                <div>
                                    <span class="fw-bold">Orden #${orden.id}</span> 
                                    <br><small class="text-muted">Producto ID: ${orden.producto_id}</small>
                                </div>
                                <span class="badge rounded-pill text-bg-success px-3 py-2"><i class="bi bi-check2-all"></i> ${orden.estado}</span>
                            </li>
                        `;
                    });
                });
        }

        
        cargarProductos();
    </script>
</body>
</html>
