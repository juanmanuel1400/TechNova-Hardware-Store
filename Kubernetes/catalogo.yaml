apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogo-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: catalogo
  template:
    metadata:
      labels:
        app: catalogo
    spec:
      containers:
      - name: catalogo
        image: tu-usuario-docker/catalogo:latest
        imagePullPolicy: IfNotPresent 
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: catalogo-service
spec:
  selector:
    app: catalogo
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000